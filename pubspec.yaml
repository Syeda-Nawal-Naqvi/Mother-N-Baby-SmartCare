name: mother_and_baby_smartcare
description: Mother And Baby SmartCare

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  lottie: ^3.3.1
  google_fonts: ^8.1.0
  shared_preferences: ^2.5.3
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.6.0
  google_sign_in: ^7.2.0
  provider: ^6.1.5+1
  connectivity_plus: ^7.1.1
  intl: ^0.20.2
  permission_handler: ^12.0.3
  fl_chart: ^1.0.0
  alarm: ^5.4.1
  flutter_foreground_task: ^8.17.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
    - assets/sounds/